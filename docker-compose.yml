services:
  remnawave-switch-squads:
    image: docker.io/byte7up/remnawave-switch-squads:latest
    container_name: remnawave-switch-squads
    restart: unless-stopped
    environment:
      - RW_API_URL=${RW_API_URL}
      - RW_API_TOKEN=${RW_API_TOKEN}
      - RW_API_CADDY_TOKEN=${RW_API_CADDY_TOKEN:-}
      - RW_API_COOKIE=${RW_API_COOKIE:-}
      - RW_API_CF_CLIENT_ID=${RW_API_CF_CLIENT_ID:-}
      - RW_API_CF_CLIENT_SECRET=${RW_API_CF_CLIENT_SECRET:-}
      - RW_API_INTERNAL_PROXY_HEADERS=${RW_API_INTERNAL_PROXY_HEADERS:-auto}
      - WEBHOOK_SECRET_HEADER=${WEBHOOK_SECRET_HEADER}
      - BACKUP_SQUAD_UUID=${BACKUP_SQUAD_UUID:-}
      - BACKUP_SQUAD_UUIDS=${BACKUP_SQUAD_UUIDS:-}
      - BACKUP_EXTERNAL_SQUAD_UUID=${BACKUP_EXTERNAL_SQUAD_UUID:-}
      - TEMP_ACTIVE_DAYS=${TEMP_ACTIVE_DAYS}
      - TEMP_ACTIVE_TRAFFIC_LIMIT_MB=${TEMP_ACTIVE_TRAFFIC_LIMIT_MB}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - WEBHOOK_MAX_AGE_SECONDS=${WEBHOOK_MAX_AGE_SECONDS:-300}
      - MAX_WEBHOOK_BODY_BYTES=${MAX_WEBHOOK_BODY_BYTES:-1048576}
      - PORT=${PORT:-3040}
      - DATA_PATH=/data/original_squads.json
    volumes:
      - remnawave-switch-squads-data:/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:${HOST_PORT:-3040}:${PORT:-3040}"
    networks:
      - remnawave-network

volumes:
  remnawave-switch-squads-data:

networks:
  remnawave-network:
    external: true
