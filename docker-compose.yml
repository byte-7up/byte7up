services:
  remna-webhook:
    build: .
    container_name: remna-webhook
    restart: unless-stopped
    environment:
      - RW_API_URL=${RW_API_URL}
      - RW_API_TOKEN=${RW_API_TOKEN}
      - BACKUP_SQUAD_UUID=${BACKUP_SQUAD_UUID}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - PORT=${PORT}
      - DATA_PATH=/data/original_squads.json
    volumes:
      - webhook_data:/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:${HOST_PORT:-3002}:${PORT:-3000}"

volumes:
  webhook_data:
